name: ERPMateus Linux Auto-Deploy

on:
  push:
    branches:
      - main

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install Velopack
        run: dotnet tool install -g vpk

      - name: Publish Linux
        run: |
          # Limpamos tudo primeiro para garantir que o código novo seja soberano
          dotnet clean ERPMateus/ERPMateus.csproj -c Release -r linux-x64
          
          # Publicamos com a flag --force para ignorar caches de restore
          dotnet publish ERPMateus/ERPMateus.csproj \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            --force \
            -o publish-linux

      - name: Pack Linux
        run: |
          # Criamos uma versão baseada no número sequencial do GitHub Actions
          # Se o build for o nº 5, a versão será 1.0.5
          VERSION="1.0.${{ github.run_number }}"

          mkdir -p ReleasesLinux
          
          vpk pack \
            --packId ERPMateus \
            --packVersion $VERSION \
            --packDir publish-linux \
            --icon ERPMateus/Assets/icon.png \
            --mainExe ERPMateus \
            --outputDir ReleasesLinux

      - name: Upload Linux to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: "ReleasesLinux/*"
          target: "/var/www/updates/erpmateus/linux"
          strip_components: 1